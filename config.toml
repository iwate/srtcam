# SRT listener port (LISTEN mode)
listen_port = 5000

# SRT receiver latency in milliseconds
srt_latency_ms = 40

# Latency profile: "balanced" | "ultra-low"
latency_profile = "ultra-low"

# v4l2loopback output device
loopback_device = "/dev/video10"

# Fixed frame size for decode/output path (default: HD)
frame_width = 1280
frame_height = 720

# Backward compatible aliases (optional)
# width = 1280
# height = 720
fps = 30

# If no live frame arrives within this time, fallback to dummy
live_timeout_ms = 300

# Internal frame channel size.
# In ultra-low mode, 1 is recommended to avoid queue-induced lag.
live_channel_capacity = 1

# FFmpeg demux/decode probe settings for startup latency control.
# analyzeduration=0 skips time-based analysis; MPEG-TS PAT/PMT are found
# via probesize bytes alone. 500000 (500KB) is reliable for most senders.
ffmpeg_analyzeduration_us = 0
ffmpeg_probesize_bytes = 500000
